spring:
  application:
    name: SGRSH - Sistema de Gestión de Reservas y Servicios Hoteleros (LOCAL)

  # Database Configuration - Local MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/sgrh_db?useSSL=false&serverTimezone=UTC
    username: hotel_tolimagrande
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false

