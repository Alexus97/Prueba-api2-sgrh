version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sgrsh-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sgrh_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - sgrsh-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgrsh-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sgrh_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      TZ: America/Bogota
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/sgrsh/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sgrsh-network
    restart: unless-stopped

  # Opcional: phpMyAdmin para administrar la base de datos
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sgrsh-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
      PMA_DB: sgrh_db
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - sgrsh-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  sgrsh-network:
    driver: bridge
